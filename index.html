    const languageNames = {
      nl: "Nederlands",
      en: "English",
      de: "Deutsch",
      fr: "Français"
    };

    function getInitialLanguage() {
      const params = new URLSearchParams(window.location.search);
      const requested = params.get("lang");
      if (requested && translations[requested]) {
        return requested;
      }
      const browserLang = (navigator.language || "nl").toLowerCase().split("-")[0];
      if (translations[browserLang]) {
        return browserLang;
      }
      return "nl";
    }

    function renderLanguage(lang) {
      const content = translations[lang] || translations.nl;
      document.documentElement.lang = content.htmlLang;
      document.title = content.title;

      document.getElementById("lang-switcher-label").textContent = content.switcherLabel;
      document.getElementById("page-title").textContent = content.title;
      document.getElementById("page-updated").textContent = content.updated;
      document.getElementById("page-intro").innerHTML = content.intro
        .map((paragraph) => `<p>${paragraph}</p>`)
        .join("");

      document.getElementById("page-sections").innerHTML = content.sections
        .map((section) => {
          const blocks = section.blocks
            .map((block) => {
              if (block.type === "ul") {
                return `<ul>${block.items.map((item) => `<li>${item}</li>`).join("")}</ul>`;
              }
              return `<p>${block.html}</p>`;
            })
            .join("");
          return `<section class="section"><h2>${section.title}</h2>${blocks}</section>`;
        })
        .join("");

      document.querySelectorAll("[data-lang-link]").forEach((link) => {
        const isActive = link.getAttribute("data-lang-link") === lang;
        link.classList.toggle("is-active", isActive);
        if (isActive) {
          link.setAttribute("aria-current", "page");
        } else {
          link.removeAttribute("aria-current");
        }
        const targetLang = link.getAttribute("data-lang-link");
        if (targetLang) {
          link.setAttribute("href", `?lang=${targetLang}`);
          link.setAttribute("aria-label", languageNames[targetLang]);
        }
      });
    }

    renderLanguage(getInitialLanguage());
  </script>
